spring.application.name=DevPulseX Backend - Tests

# Use H2 in-memory DB for tests
spring.datasource.url=jdbc:h2:mem:devpulsex_test;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.open-in-view=false

# JWT settings (must be same length/valid secret)
app.security.jwt.secret=devpulseXdevpulseXdevpulseXdevpulseXdevpulseXdevpulseX
app.security.jwt.expiration-ms=3600000

# OAuth placeholders required by bean wiring during integration tests
github.client-id=test-github-client-id
github.client-secret=test-github-client-secret
github.redirect-uri=http://localhost:3000/auth/callback

google.client-id=test-google-client-id
google.client-secret=test-google-client-secret
google.redirect-uri=http://localhost:3000/auth/callback

# Trello placeholders required by bean wiring during integration tests
trello.api.key=test-key
trello.encryption.secret=test-encryption-secret-32-bytes-minimum

# Silence logs a bit during tests
logging.level.root=WARN
logging.level.org.springframework.test=INFO
logging.level.com.devpulsex=INFO
